<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris - Dharm's Game Hub</title>
    <link rel="icon" href="https://emojiapi.dev/api/v1/video_game/64.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { mono: ['"Courier New"', "monospace"] },
            keyframes: {
              gradientShift: {
                "0%, 100%": { backgroundPosition: "0% 50%" },
                "50%": { backgroundPosition: "100% 50%" },
              },
            },
            animation: {
              "gradient-shift": "gradientShift 12s ease infinite",
            },
          },
        },
      };
    </script>
    <style>
      /* Canvas needs explicit styling for border/bg */
      canvas {
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.4);
      }
      #tetris {
        width: min(250px, 72vw);
        height: auto;
        touch-action: none;
      }
      #nextCanvas {
        width: 100px;
        height: 80px;
      }

      /* Overlay toggle */
      .overlay.active {
        display: flex;
      }

      @media (max-width: 640px) {
        body {
          justify-content: flex-start;
          padding: 14px 10px 18px;
          overflow-y: auto;
        }
      }
    </style>
  </head>
  <body
    class="font-mono bg-[length:400%_400%] animate-gradient-shift min-h-screen flex flex-col items-center justify-center text-gray-200 overflow-x-hidden overflow-y-auto select-none"
    style="
      background-image: linear-gradient(
        -45deg,
        #0a0a2e,
        #1a1a4e,
        #0d2137,
        #0a0a2e
      );
    "
  >
    <!-- Header -->
    <div class="mb-2.5">
      <h1
        class="text-4xl font-black tracking-widest text-center bg-clip-text text-transparent"
        style="
          background-image: linear-gradient(90deg, #ff6fd8, #ffd86f, #6fffe9);
        "
      >
        TETRIS
      </h1>
    </div>

    <!-- Game Wrapper -->
    <div class="flex gap-4 items-start flex-wrap justify-center">
      <canvas id="tetris" width="250" height="500"></canvas>

      <!-- Side Panel -->
      <div
        class="flex flex-col gap-3 min-w-[120px] max-sm:flex-row max-sm:flex-wrap max-sm:justify-center"
      >
        <div
          class="bg-white/[0.08] border border-white/[0.15] rounded-xl py-2.5 px-3.5 text-center"
        >
          <div
            class="text-[0.65rem] uppercase tracking-widest text-gray-400 mb-1"
          >
            Score
          </div>
          <div class="text-xl font-bold text-[#ffd86f]" id="score">0</div>
        </div>
        <div
          class="bg-white/[0.08] border border-white/[0.15] rounded-xl py-2.5 px-3.5 text-center"
        >
          <div
            class="text-[0.65rem] uppercase tracking-widest text-gray-400 mb-1"
          >
            Level
          </div>
          <div class="text-xl font-bold text-[#ffd86f]" id="level">1</div>
        </div>
        <div
          class="bg-white/[0.08] border border-white/[0.15] rounded-xl py-2.5 px-3.5 text-center"
        >
          <div
            class="text-[0.65rem] uppercase tracking-widest text-gray-400 mb-1"
          >
            Lines
          </div>
          <div class="text-xl font-bold text-[#ffd86f]" id="lines">0</div>
        </div>
        <div
          class="bg-white/[0.08] border border-white/[0.15] rounded-xl py-2.5 px-3.5 text-center max-sm:min-w-[80px]"
        >
          <div
            class="text-[0.65rem] uppercase tracking-widest text-gray-400 mb-1"
          >
            Next
          </div>
          <canvas
            id="nextCanvas"
            width="100"
            height="80"
            class="block mx-auto"
          ></canvas>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex gap-2.5 mt-3 flex-wrap justify-center">
      <button
        id="startBtn"
        class="py-2 px-5 border border-white/20 rounded-xl bg-white/[0.08] text-gray-200 font-mono text-sm cursor-pointer transition-all duration-200 hover:bg-white/[0.15] hover:-translate-y-0.5"
      >
        Start
      </button>
      <button
        id="pauseBtn"
        class="py-2 px-5 border border-white/20 rounded-xl bg-white/[0.08] text-gray-200 font-mono text-sm cursor-pointer transition-all duration-200 hover:bg-white/[0.15] hover:-translate-y-0.5"
      >
        Pause
      </button>
      <a
        href="./index.html"
        class="py-2 px-5 border border-white/20 rounded-xl bg-white/[0.08] text-gray-200 font-mono text-sm cursor-pointer transition-all duration-200 hover:bg-white/[0.15] hover:-translate-y-0.5 no-underline"
      >
        Home
      </a>
    </div>

    <!-- Game Over Overlay -->
    <div
      id="gameOverOverlay"
      class="overlay hidden fixed inset-0 bg-black/75 z-[100] items-center justify-center"
    >
      <div
        class="bg-[#1a1a4e] border-2 border-white/[0.15] rounded-2xl p-9 text-center max-w-[320px]"
      >
        <h2 class="text-3xl font-bold mb-2 text-[#ff5533]">Game Over</h2>
        <p class="mb-5 text-gray-400">
          Score: <strong id="finalScore">0</strong>
        </p>
        <button
          id="retryBtn"
          class="py-2 px-5 border border-white/20 rounded-xl bg-white/[0.08] text-gray-200 font-mono text-sm cursor-pointer transition-all duration-200 hover:bg-white/[0.15] hover:-translate-y-0.5"
        >
          Play Again
        </button>
        <br />
        <a
          href="./index.html"
          class="inline-block mt-2.5 text-[#6fffe9] no-underline text-sm hover:underline"
        >
          Back to Game Hub
        </a>
      </div>
    </div>

    <script>
      // --- Constants ---
      const COLS = 10,
        ROWS = 20,
        BLOCK = 25;
      const COLORS = [
        "#6fffe9",
        "#ff6fd8",
        "#ffd86f",
        "#ff7844",
        "#5ce0d0",
        "#d84fff",
        "#ff5533",
      ];

      const PIECES = [
        [[1, 1, 1, 1]], // I
        [
          [1, 1],
          [1, 1],
        ], // O
        [
          [0, 1, 0],
          [1, 1, 1],
        ], // T
        [
          [1, 0, 0],
          [1, 1, 1],
        ], // L
        [
          [0, 0, 1],
          [1, 1, 1],
        ], // J
        [
          [0, 1, 1],
          [1, 1, 0],
        ], // S
        [
          [1, 1, 0],
          [0, 1, 1],
        ], // Z
      ];

      // --- State ---
      const canvas = document.getElementById("tetris");
      const ctx = canvas.getContext("2d");
      const nextCanvas = document.getElementById("nextCanvas");
      const nCtx = nextCanvas.getContext("2d");

      let board = [];
      let current, currentX, currentY, currentColor;
      let nextPiece, nextColor;
      let score = 0,
        lines = 0,
        level = 1;
      let dropInterval, dropTimer;
      let paused = false,
        gameOver = false,
        started = false;

      function newBoard() {
        return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
      }

      function randomPiece() {
        const i = Math.floor(Math.random() * PIECES.length);
        return { shape: PIECES[i].map((r) => [...r]), color: COLORS[i] };
      }

      function rotate(shape) {
        const rows = shape.length,
          cols = shape[0].length;
        const rotated = Array.from({ length: cols }, () => Array(rows).fill(0));
        for (let r = 0; r < rows; r++)
          for (let c = 0; c < cols; c++) rotated[c][rows - 1 - r] = shape[r][c];
        return rotated;
      }

      function valid(shape, offX, offY) {
        for (let r = 0; r < shape.length; r++)
          for (let c = 0; c < shape[r].length; c++)
            if (shape[r][c]) {
              const nx = offX + c,
                ny = offY + r;
              if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
              if (ny >= 0 && board[ny][nx]) return false;
            }
        return true;
      }

      function lock() {
        for (let r = 0; r < current.length; r++)
          for (let c = 0; c < current[r].length; c++)
            if (current[r][c]) {
              const y = currentY + r;
              if (y < 0) {
                endGame();
                return;
              }
              board[y][currentX + c] = currentColor;
            }
        clearLines();
        spawn();
      }

      function clearLines() {
        let cleared = 0;
        for (let r = ROWS - 1; r >= 0; r--) {
          if (board[r].every((cell) => cell !== 0)) {
            board.splice(r, 1);
            board.unshift(Array(COLS).fill(0));
            cleared++;
            r++; // recheck row
          }
        }
        if (cleared > 0) {
          const pts = [0, 100, 300, 500, 800];
          score += (pts[cleared] || 800) * level;
          lines += cleared;
          level = Math.floor(lines / 10) + 1;
          dropInterval = Math.max(80, 500 - (level - 1) * 40);
          updateUI();
        }
      }

      function spawn() {
        current = nextPiece.shape;
        currentColor = nextPiece.color;
        currentX = Math.floor((COLS - current[0].length) / 2);
        currentY = -current.length;
        const n = randomPiece();
        nextPiece = n;
        nextColor = n.color;
        drawNext();
        if (!valid(current, currentX, 0)) {
          endGame();
        }
      }

      function endGame() {
        gameOver = true;
        clearInterval(dropTimer);
        document.getElementById("finalScore").textContent = score;
        document.getElementById("gameOverOverlay").classList.add("active");
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Grid lines
        ctx.strokeStyle = "rgba(255,255,255,0.04)";
        for (let r = 0; r <= ROWS; r++) {
          ctx.beginPath();
          ctx.moveTo(0, r * BLOCK);
          ctx.lineTo(COLS * BLOCK, r * BLOCK);
          ctx.stroke();
        }
        for (let c = 0; c <= COLS; c++) {
          ctx.beginPath();
          ctx.moveTo(c * BLOCK, 0);
          ctx.lineTo(c * BLOCK, ROWS * BLOCK);
          ctx.stroke();
        }

        // Board
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (board[r][c]) drawBlock(ctx, c, r, board[r][c]);

        // Ghost piece
        if (current) {
          let ghostY = currentY;
          while (valid(current, currentX, ghostY + 1)) ghostY++;
          for (let r = 0; r < current.length; r++)
            for (let c = 0; c < current[r].length; c++)
              if (current[r][c]) {
                const gy = ghostY + r;
                if (gy >= 0) {
                  ctx.fillStyle = "rgba(255,255,255,0.08)";
                  ctx.fillRect(
                    (currentX + c) * BLOCK + 1,
                    gy * BLOCK + 1,
                    BLOCK - 2,
                    BLOCK - 2,
                  );
                  ctx.strokeStyle = "rgba(255,255,255,0.2)";
                  ctx.strokeRect(
                    (currentX + c) * BLOCK + 1,
                    gy * BLOCK + 1,
                    BLOCK - 2,
                    BLOCK - 2,
                  );
                }
              }
        }

        // Current piece
        if (current)
          for (let r = 0; r < current.length; r++)
            for (let c = 0; c < current[r].length; c++)
              if (current[r][c]) {
                const py = currentY + r;
                if (py >= 0) drawBlock(ctx, currentX + c, py, currentColor);
              }
      }

      function drawBlock(context, x, y, color) {
        const px = x * BLOCK,
          py = y * BLOCK;
        context.fillStyle = color;
        context.fillRect(px + 1, py + 1, BLOCK - 2, BLOCK - 2);
        context.fillStyle = "rgba(255,255,255,0.2)";
        context.fillRect(px + 1, py + 1, BLOCK - 2, 3);
        context.fillRect(px + 1, py + 1, 3, BLOCK - 2);
        context.fillStyle = "rgba(0,0,0,0.15)";
        context.fillRect(px + BLOCK - 3, py + 1, 2, BLOCK - 2);
        context.fillRect(px + 1, py + BLOCK - 3, BLOCK - 2, 2);
      }

      function drawNext() {
        nCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        const shape = nextPiece.shape;
        const bSize = 18;
        const offX = (nextCanvas.width - shape[0].length * bSize) / 2;
        const offY = (nextCanvas.height - shape.length * bSize) / 2;
        for (let r = 0; r < shape.length; r++)
          for (let c = 0; c < shape[r].length; c++)
            if (shape[r][c]) {
              const px = offX + c * bSize,
                py = offY + r * bSize;
              nCtx.fillStyle = nextPiece.color;
              nCtx.fillRect(px + 1, py + 1, bSize - 2, bSize - 2);
              nCtx.fillStyle = "rgba(255,255,255,0.2)";
              nCtx.fillRect(px + 1, py + 1, bSize - 2, 2);
            }
      }

      function updateUI() {
        document.getElementById("score").textContent = score;
        document.getElementById("level").textContent = level;
        document.getElementById("lines").textContent = lines;
      }

      function tick() {
        if (paused || gameOver) return;
        if (valid(current, currentX, currentY + 1)) {
          currentY++;
        } else {
          lock();
        }
        draw();
      }

      function hardDrop() {
        while (valid(current, currentX, currentY + 1)) {
          currentY++;
          score += 2;
        }
        lock();
        updateUI();
        draw();
      }

      function startGame() {
        board = newBoard();
        score = 0;
        lines = 0;
        level = 1;
        dropInterval = 500;
        gameOver = false;
        paused = false;
        started = true;
        updateUI();
        document.getElementById("gameOverOverlay").classList.remove("active");
        const n1 = randomPiece(),
          n2 = randomPiece();
        nextPiece = n1;
        nextColor = n1.color;
        spawn();
        const nn = randomPiece();
        nextPiece = nn;
        nextColor = nn.color;
        drawNext();
        draw();
        clearInterval(dropTimer);
        dropTimer = setInterval(tick, dropInterval);
      }

      // Update interval when level changes
      let lastLevel = 1;
      function checkLevel() {
        if (level !== lastLevel) {
          lastLevel = level;
          clearInterval(dropTimer);
          dropTimer = setInterval(tick, dropInterval);
        }
      }

      function rotateCurrent() {
        const rotated = rotate(current);
        if (valid(rotated, currentX, currentY)) current = rotated;
        else if (valid(rotated, currentX - 1, currentY)) {
          current = rotated;
          currentX--;
        } else if (valid(rotated, currentX + 1, currentY)) {
          current = rotated;
          currentX++;
        }
      }

      // --- Controls ---
      document.addEventListener("keydown", (e) => {
        if (gameOver || !started) return;
        if (paused && e.key !== "p" && e.key !== "P") return;

        switch (e.key) {
          case "ArrowLeft":
            e.preventDefault();
            if (valid(current, currentX - 1, currentY)) currentX--;
            break;
          case "ArrowRight":
            e.preventDefault();
            if (valid(current, currentX + 1, currentY)) currentX++;
            break;
          case "ArrowDown":
            e.preventDefault();
            if (valid(current, currentX, currentY + 1)) {
              currentY++;
              score += 1;
              updateUI();
            }
            break;
          case "ArrowUp":
            e.preventDefault();
            rotateCurrent();
            break;
          case " ":
            e.preventDefault();
            hardDrop();
            break;
          case "p":
          case "P":
            e.preventDefault();
            paused = !paused;
            document.getElementById("pauseBtn").textContent = paused
              ? "Resume"
              : "Pause";
            break;
        }
        draw();
        checkLevel();
      });

      // Mobile swipe controls
      let touchStartX = 0;
      let touchStartY = 0;
      let touchMoved = false;
      const SWIPE_THRESHOLD = 28;

      canvas.addEventListener(
        "touchstart",
        (e) => {
          if (!e.touches.length) return;
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
          touchMoved = false;
        },
        { passive: true },
      );

      canvas.addEventListener(
        "touchmove",
        (e) => {
          touchMoved = true;
          e.preventDefault();
        },
        { passive: false },
      );

      canvas.addEventListener("touchend", (e) => {
        if (gameOver || !started || paused) return;

        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);

        if (!touchMoved || (absX < SWIPE_THRESHOLD && absY < SWIPE_THRESHOLD)) {
          rotateCurrent();
        } else if (absX > absY) {
          if (dx > 0 && valid(current, currentX + 1, currentY)) currentX++;
          if (dx < 0 && valid(current, currentX - 1, currentY)) currentX--;
        } else {
          if (dy < 0) {
            rotateCurrent();
          } else if (dy > SWIPE_THRESHOLD * 2) {
            hardDrop();
          } else if (valid(current, currentX, currentY + 1)) {
            currentY++;
            score += 1;
            updateUI();
          }
        }

        draw();
        checkLevel();
      });

      // Buttons
      document.getElementById("startBtn").addEventListener("click", startGame);
      document.getElementById("retryBtn").addEventListener("click", startGame);
      document.getElementById("pauseBtn").addEventListener("click", () => {
        if (!started || gameOver) return;
        paused = !paused;
        document.getElementById("pauseBtn").textContent = paused
          ? "Resume"
          : "Pause";
      });

      // Initial draw
      board = newBoard();
      draw();
    </script>
  </body>
</html>
